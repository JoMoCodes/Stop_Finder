<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stop Finder — Apartment Number Course</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }
  .hidden { display: none !important; }

  /* top prompt */
  #prompt {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    width: min(760px, calc(100% - 32px));
    background: rgba(20, 24, 30, 0.86); backdrop-filter: blur(6px);
    color: #eef2f6; border: 1px solid rgba(255,255,255,0.14);
    border-radius: 14px; padding: 16px 20px; line-height: 1.55; font-size: 15px;
    box-shadow: 0 10px 34px rgba(0,0,0,0.4); z-index: 10; text-align: center;
  }
  #prompt b { color: #ffd9a0; }

  /* buttons */
  button {
    font: inherit; cursor: pointer; border: none; border-radius: 999px;
    padding: 13px 30px; font-size: 16px; font-weight: 600; color: #08130c;
    background: #57c97e; box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    transition: transform .1s ease, background .12s ease;
  }
  button:hover { transform: translateY(-2px); background: #6fe096; }
  button.ghost {
    background: rgba(255,255,255,0.10); color: #eef2f6;
    border: 1px solid rgba(255,255,255,0.20); font-weight: 500; padding: 11px 20px;
  }
  button.ghost:hover { background: rgba(255,255,255,0.18); }

  /* bottom button bar */
  #bottombar {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; align-items: center; gap: 10px;
  }

  /* left-side "walk around" buttons (Part 5) */
  #viewbar {
    position: fixed; top: 50%; left: 22px; transform: translateY(-50%);
    z-index: 11; display: flex; flex-direction: column; gap: 8px; width: 130px;
    background: rgba(20,24,30,0.90); backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 14px;
    padding: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.45);
  }
  #viewbar .vbtitle { color: #9fb0c0; font-size: 12px; text-align: center; margin-bottom: 2px; }
  #viewbar button.vbtn { padding: 10px 14px; font-size: 15px; text-align: center; }

  /* right-side quiz panel */
  #quiz {
    position: fixed; top: 50%; right: 22px; transform: translateY(-50%);
    width: 224px; z-index: 11;
    background: rgba(20,24,30,0.90); backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 14px;
    padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.45);
  }
  #quiz .qhead { color: #eef2f6; font-weight: 600; margin-bottom: 12px; text-align: center; }
  #quiz .qhead small { display: block; color: #9fb0c0; font-weight: 400; font-size: 12px; margin-top: 2px; }
  #qopts { display: flex; flex-direction: column; gap: 8px; }
  button.opt {
    background: rgba(255,255,255,0.08); color: #eef2f6;
    border: 1px solid rgba(255,255,255,0.18); border-radius: 10px;
    padding: 10px 14px; font-size: 16px; font-weight: 600; text-align: left;
    box-shadow: none;
  }
  button.opt:hover { background: rgba(255,255,255,0.16); transform: none; }
  button.opt .ltr { display: inline-block; width: 22px; color: #ffd9a0; }
  button.opt.wrong { background: rgba(229,57,53,0.25); border-color: rgba(229,57,53,0.6); animation: shake .3s; }
  button.opt.right { background: rgba(87,201,126,0.28); border-color: rgba(87,201,126,0.7); }
  button.opt:disabled { cursor: default; }
  #qmsg { margin-top: 12px; text-align: center; font-size: 13px; min-height: 16px; }
  #qmsg.ok { color: #7ee0a0; }
  #qmsg.bad { color: #ff9a8a; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
</style>
</head>
<body>
<div id="app"></div>

<div id="prompt"></div>

<!-- right-side multiple-choice panel -->
<div id="quiz" class="hidden">
  <div class="qhead" id="qhead">Which unit is this?<small>Pick the number that fits the pattern</small></div>
  <div id="qopts"></div>
  <div id="qmsg"></div>
</div>

<!-- Part 5 navigation: jump the camera to each face of the building -->
<div id="viewbar" class="hidden">
  <div class="vbtitle">Walk around</div>
  <button class="ghost vbtn" data-view="front">Front</button>
  <button class="ghost vbtn" data-view="back">Back</button>
  <button class="ghost vbtn" data-view="left">Left</button>
  <button class="ghost vbtn" data-view="right">Right</button>
</div>

<div id="bottombar">
  <button id="back" class="ghost hidden">◀ Back</button>
  <button id="continue" class="hidden">Continue ▸</button>
  <button id="next" class="hidden">Next Building ▸</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================================================
   CONFIG — 2-story garden 4-plex. Units run sequentially around
   each building: front F1 (L,R), F2 (L,R), then back F1, F2.
   Each "building" in the course shows one façade of 4 units:
   Bld 1 = example 101-108, Bld 2 = 109-112, Bld 3 = 113-116,
   Bld 4 = 117-120 (continuing the same numbering).
   ============================================================ */
const CONFIG = {
  floors: 2, width: 14, depth: 9, floorHeight: 3.2,
  doorOffsetX: 1.45, windowOffsetX: 4.6, gap: 10,
};

const COLOR = {
  ground: 0x86996a, walkway: 0xbdb8ad, road: 0x8c8c8c,
  brick: 0xc7b29a, siding: 0xb0493a, band: 0xe7dcc4,
  roof: 0x4a3b30, canopy: 0xe9ddc4,
  door: 0x4f8d5a, glass: 0x3a4654, trim: 0xe9ddc4,
  balcony: 0xcfc7b6, step: 0xcfc7b6, sky: 0xbfd9ec,
  arrow: 0xffd54a,
};

const W = CONFIG.width, D = CONFIG.depth, FH = CONFIG.floorHeight;
const H = CONFIG.floors * FH, HALF_D = D / 2, SPAN = W + CONFIG.gap;

/* ---- Part 2: tall 4-story walk-up (3 doors per floor). Same depth as the
   plex so the shared ground/road still fit; only wider. Units are 3 digits
   where the FIRST digit is the floor and the last two digits are the column. */
const TW = 18, TD = 9, TFLOORS = 4, TFH = 3.2;
const TH = TFLOORS * TFH, THALF_D = TD / 2;   // 12.8 tall, 4.5 half-depth
const TDOORX = [-5.5, 0, 5.5];                 // left / middle / right doors

/* ---- Part 3: wide 2-story "garden row" with 5 doors per floor. Units are
   4- or 5-digit; the LEADING digit(s) are the building number, then the floor,
   then the door. Learners fill the gaps, then name the building. */
const RW = 24, RD = 9, RFLOORS = 2, RFH = 3.2;
const RH = RFLOORS * RFH, RHALF_D = RD / 2;
const RDOORX = [-9.6, -4.8, 0, 4.8, 9.6];

/* ---- Part 4: 4-story block numbered around BOTH faces (front doors + the
   doors directly behind them). 5-digit units: building*1000 + floor*100 +
   suffix, where the front gets odd suffixes and the back gets even. */
const BW = 16, BD = 10, BFLOORS = 4, BFH = 3.2;
const BH = BFLOORS * BFH, BHALF_D = BD / 2;
const BDOORX = 3.6;                            // door offset from centre

/* ---- Part 5: a uniform 3-story block shown as an OPEN DOLLHOUSE (no roof, no
   outer shell). The unit number is a single running count with NO floor digit,
   so floor 1 owns both the lowest numbers AND the highest. Doors sit around the
   perimeter facing OUT, so each side's doors read straight-on from its nav
   button. Floor 1 is fully occupied (left 1-4, right 17-20, back 5-6, front
   7-8); floors 2-3 have only front/back pairs. A central hallway runs
   front->back on every floor. ---- */
const SQW = 12, SQHW = SQW / 2;          // width  (X, left <-> right)
const SQD = 22, SQHD = SQD / 2;          // depth  (Z, front <-> back)
const SQFH = 3.2, SQFLOORS = 3, SQH = SQFLOORS * SQFH;

/* door slots: { d:door#, f:floorIndex 0-2, face:'L'|'R'|'F'|'B', a:position
   along that wall (z for L/R, x for F/B) }. Left counts up toward the back;
   right counts up from the back to the front. */
const SQ_LAYOUT = [
  // floor 1 left wall (front -> back) = 1..4
  { d: 1, f: 0, face: 'L', a:  7.5 }, { d: 2, f: 0, face: 'L', a:  2.5 },
  { d: 3, f: 0, face: 'L', a: -2.5 }, { d: 4, f: 0, face: 'L', a: -7.5 },
  // floor 1 back wall 5,6 ; front wall 7,8
  { d: 5, f: 0, face: 'B', a: -3 }, { d: 6, f: 0, face: 'B', a: 3 },
  { d: 7, f: 0, face: 'F', a: -3 }, { d: 8, f: 0, face: 'F', a: 3 },
  // floor 2 back 9,10 ; front 11,12
  { d: 9, f: 1, face: 'B', a: -3 }, { d: 10, f: 1, face: 'B', a: 3 },
  { d: 11, f: 1, face: 'F', a: -3 }, { d: 12, f: 1, face: 'F', a: 3 },
  // floor 3 back 13,14 ; front 15,16
  { d: 13, f: 2, face: 'B', a: -3 }, { d: 14, f: 2, face: 'B', a: 3 },
  { d: 15, f: 2, face: 'F', a: -3 }, { d: 16, f: 2, face: 'F', a: 3 },
  // floor 1 right wall (back -> front) = 17..20
  { d: 17, f: 0, face: 'R', a: -7.5 }, { d: 18, f: 0, face: 'R', a: -2.5 },
  { d: 19, f: 0, face: 'R', a:  2.5 }, { d: 20, f: 0, face: 'R', a:  7.5 },
];

/* ============================================================ */
const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(COLOR.sky);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 3000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
app.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.maxPolarAngle = Math.PI * 0.49;

scene.add(new THREE.HemisphereLight(0xffffff, 0x6b7280, 0.9));
const sun = new THREE.DirectionalLight(0xfff4e0, 1.05);
sun.position.set(SPAN, H * 2.5, HALF_D + SPAN);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

/* ---- helpers ---- */
function box(parent, w, h, d, color, x, y, z, opts = {}) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ color, roughness: 0.92, ...opts }));
  m.position.set(x, y, z);
  parent.add(m);
  return m;
}
function makeTextTexture(text, opts = {}) {
  const { w = 512, h = 256, bg = 'rgba(255,255,255,0.95)', fg = '#16202b', font = 'bold 170px sans-serif' } = opts;
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  if (bg) { ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h); }
  ctx.fillStyle = fg; ctx.font = font; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, w / 2, h / 2);
  const tex = new THREE.CanvasTexture(c); tex.anisotropy = 8; return tex;
}
function label(parent, text, pw, ph, texOpts = {}) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(pw, ph),
    new THREE.MeshBasicMaterial({ map: makeTextTexture(text, texOpts), transparent: true }));
  parent.add(m); return m;
}
function setPlateText(plate, text, texOpts = {}) {
  plate.material.map.dispose();
  plate.material.map = makeTextTexture(text, texOpts);
  plate.material.needsUpdate = true;
}

/* ---- a bright, readable 3D arrow from -> to ---- */
function arrow(parent, from, to, color) {
  const dir = to.clone().sub(from);
  const len = dir.length();
  const shaftLen = Math.max(0.05, len - 0.6);
  const grp = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color });
  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, shaftLen, 12), mat);
  shaft.position.y = shaftLen / 2;
  const head = new THREE.Mesh(new THREE.ConeGeometry(0.26, 0.6, 16), mat);
  head.position.y = shaftLen + 0.3;
  grp.add(shaft, head);
  grp.position.copy(from);
  grp.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
  parent.add(grp);
}

/* ============================================================
   façade pieces shared by every building
   ============================================================ */
function addWindows(g, fi, s) {
  const base = fi * FH, surf = s * (HALF_D + 0.05);
  for (const wx of [-CONFIG.windowOffsetX, CONFIG.windowOffsetX]) {
    box(g, 2.0, 1.7, 0.05, COLOR.trim, wx, base + 1.65, surf);
    box(g, 1.65, 1.4, 0.06, COLOR.glass, wx, base + 1.65, s * (HALF_D + 0.07), { roughness: 0.3, metalness: 0.1 });
  }
}
function addFacadeCommon(g, s) {
  // open 2nd-floor landing (no fence)
  box(g, 6.6, 0.16, 1.5, COLOR.balcony, 0, FH - 0.06, s * (HALF_D + 0.75));
  // central staircase, no handrail
  const z = s * (HALF_D + 1.0), x0 = 3.0, x1 = -0.4, y0 = 0.12, y1 = FH - 0.05;
  for (let i = 0; i < 12; i++) {
    const t = i / 11;
    box(g, 0.7, 0.12, 1.25, COLOR.step, THREE.MathUtils.lerp(x0, x1, t) * s, THREE.MathUtils.lerp(y0, y1, t), z);
  }
  box(g, 7, 0.4, 1.7, COLOR.canopy, 0, H - 0.05, s * (HALF_D + 0.9));   // eyebrow canopy
}

/* one façade. getUnit(faceOrder, floor, side) -> {type:'num'|'blank'|'none', value} */
function buildFacade(g, s, isFront, getUnit, raycastList, blankStates) {
  const surf = s * (HALF_D + 0.05), plateZ = s * (HALF_D + 0.09);
  const yaw = s > 0 ? 0 : Math.PI, faceOrder = isFront ? 0 : 1;
  const leftX = isFront ? -CONFIG.doorOffsetX : CONFIG.doorOffsetX;
  const rightX = isFront ? CONFIG.doorOffsetX : -CONFIG.doorOffsetX;

  for (let fi = 0; fi < CONFIG.floors; fi++) {
    const base = fi * FH;
    for (const sd of [{ x: leftX, i: 0 }, { x: rightX, i: 1 }]) {
      const u = getUnit(faceOrder, fi, sd.i);
      const door = box(g, 1.25, 2.05, 0.14, COLOR.door, sd.x, base + 1.05, surf);
      if (!u || u.type === 'none') continue;

      if (u.type === 'num') {
        const plate = label(g, String(u.value), 1.7, 0.85);
        plate.position.set(sd.x, base + 2.5, plateZ);
        plate.rotation.y = yaw;
      } else { // blank — clickable
        const plate = label(g, '?', 1.7, 0.85, { fg: '#c0392b' });
        plate.position.set(sd.x, base + 2.5, plateZ);
        plate.rotation.y = yaw;
        const bstate = { value: u.value, solved: false, plate, options: makeOptions(u.value) };
        plate.userData.bstate = bstate;
        door.userData.bstate = bstate;
        raycastList.push(plate, door);
        blankStates.push(bstate);
      }
    }
    addWindows(g, fi, s);
  }
  addFacadeCommon(g, s);
}

/* ============================================================
   building shell (walls, roof, sidewalk, side number signs)
   ============================================================ */
function buildShell(g, number) {
  box(g, W, FH, D, COLOR.brick, 0, FH / 2, 0);
  box(g, W, FH, D, COLOR.siding, 0, FH + FH / 2, 0);
  box(g, W + 0.15, 0.18, D + 0.15, COLOR.band, 0, FH, 0);
  box(g, W + 1.4, 0.4, D + 1.4, COLOR.roof, 0, H + 0.2, 0);

  const sw = 2.2, sy = -0.14, st = 0.05;
  for (const s of [1, -1]) box(g, W + 2 * sw, st, sw, COLOR.walkway, 0, sy, s * (HALF_D + sw / 2));
  for (const ex of [1, -1]) box(g, sw, st, D + 2 * sw, COLOR.walkway, ex * (W / 2 + sw / 2), sy, 0);

  for (const ex of [1, -1]) {
    const sign = label(g, String(number), 2.4, 2.4, { bg: 'rgba(20,24,30,0.92)', fg: '#ffe4c2', font: 'bold 320px sans-serif' });
    sign.position.set(ex * (W / 2 + 0.06), H * 0.6, 0);
    sign.rotation.y = ex > 0 ? -Math.PI / 2 : Math.PI / 2;
  }
}

/* arrows tracing the counting order on the example front façade:
   bottom-left -> bottom-right -> up to top-left -> top-right */
function addArrows(g) {
  // pushed forward to sit right at the front edge of the central staircase
  const z = HALF_D + 1.55, yb = 2.0, yt = 5.25, xl = -CONFIG.doorOffsetX, xr = CONFIG.doorOffsetX;
  arrow(g, new THREE.Vector3(xl, yb, z), new THREE.Vector3(xr, yb, z), COLOR.arrow); // 1st -> 2nd
  arrow(g, new THREE.Vector3(xr, yb, z), new THREE.Vector3(xl, yt, z), COLOR.arrow); // wrap up
  arrow(g, new THREE.Vector3(xl, yt, z), new THREE.Vector3(xr, yt, z), COLOR.arrow); // 3rd -> 4th
}

/* ============================================================
   PART 2 — 4-story building. First digit = floor.
   ============================================================ */

/* options are the SAME unit on every floor (e.g. 129/229/329/429) so the
   learner must read the first digit to pick the right floor. */
function makeTowerOptions(correct) {
  const suffix = correct % 100;
  return shuffle([1, 2, 3, 4].map(f => f * 100 + suffix));
}

function buildTowerShell(g, txt) {
  for (let fi = 0; fi < TFLOORS; fi++) {
    box(g, TW, TFH, TD, fi % 2 ? COLOR.siding : COLOR.brick, 0, fi * TFH + TFH / 2, 0);
    box(g, TW + 0.15, 0.16, TD + 0.15, COLOR.band, 0, (fi + 1) * TFH, 0);
  }
  box(g, TW + 1.4, 0.4, TD + 1.4, COLOR.roof, 0, TH + 0.2, 0);

  const sw = 2.2, sy = -0.14, st = 0.05;
  for (const s of [1, -1]) box(g, TW + 2 * sw, st, sw, COLOR.walkway, 0, sy, s * (THALF_D + sw / 2));
  for (const ex of [1, -1]) box(g, sw, st, TD + 2 * sw, COLOR.walkway, ex * (TW / 2 + sw / 2), sy, 0);

  // building identifier — a LETTER, so it can't be mistaken for the floor digit
  for (const ex of [1, -1]) {
    const sign = label(g, txt, 2.6, 2.6, { bg: 'rgba(20,24,30,0.92)', fg: '#ffe4c2', font: 'bold 300px sans-serif' });
    sign.position.set(ex * (TW / 2 + 0.06), TH * 0.62, 0);
    sign.rotation.y = ex > 0 ? -Math.PI / 2 : Math.PI / 2;
  }
}

/* exterior walkways on floors 2-4, a ground stoop, and a switchback stair */
function buildTowerAccess(g) {
  const wDepth = 1.7, wzc = THALF_D + 0.85;
  for (let fi = 1; fi < TFLOORS; fi++) {
    box(g, TW, 0.16, wDepth, COLOR.balcony, 0, fi * TFH - 0.06, wzc);
    for (const px of [-TW / 2 + 0.6, -3, 3, TW / 2 - 0.6])
      box(g, 0.18, fi * TFH, 0.18, COLOR.trim, px, (fi * TFH) / 2, wzc + wDepth / 2 - 0.2);
  }
  box(g, TW, 0.12, wDepth, COLOR.step, 0, 0.0, wzc); // ground stoop

  const flight = (x, z0, z1, y0, y1, n = 6) => {
    const dz = (z1 - z0) / n;
    for (let i = 0; i < n; i++) {
      const t = (i + 0.5) / n;
      box(g, 1.4, 0.12, Math.abs(dz) + 0.02, COLOR.step, x, y0 + (y1 - y0) * t, z0 + dz * (i + 0.5));
    }
  };
  const landing = (yc, zc) => box(g, 3.0, 0.14, 1.4, COLOR.balcony, 10.8, yc - 0.07, zc);

  const zF = THALF_D + 0.9, zB = -1.6, xA = 10.0, xB = 11.6;
  for (let t = 0; t < TFLOORS - 1; t++) {
    const yFloor = t * TFH, yMid = t * TFH + TFH / 2, yNext = (t + 1) * TFH;
    landing(yFloor, zF);
    flight(xA, zF - 0.7, zB + 0.7, yFloor, yMid);
    landing(yMid, zB);
    flight(xB, zB + 0.7, zF - 0.7, yMid, yNext);
  }
  landing((TFLOORS - 1) * TFH, zF);
}

/* big up-arrow + floor badges on the left: shows the first digit climbing 1->4 */
function addTowerArrows(g) { 
  const x = -TW / 2 - 0.9, z = THALF_D + 1.6; 
  
  // 1. Create a specific X coordinate for the arrow (subtract more to move it left)
  const arrowX = x - 2; 
  
  // 2. Use 'arrowX' instead of 'x' here
  arrow(g, new THREE.Vector3(arrowX, 1.6, z), new THREE.Vector3(arrowX, TH - 0.9, z), COLOR.arrow); 
  
  // The labels will stay in their original position because they still use 'x'
  for (let fi = 0; fi < TFLOORS; fi++) { 
    const b = label(g, String(fi + 1), 1.0, 1.0, { bg: 'rgba(20,24,30,0.85)', fg: '#ffd54a', font: 'bold 240px sans-serif' }); 
    b.position.set(x, fi * TFH + 2.55, z + 0.02); 
  } 
}


/* one front façade: 4 floors x 3 doors. getUnit(floor, col) -> {type,value} */
function buildTowerFacade(g, getUnit, raycastList, blankStates) {
  const surf = THALF_D + 0.05, plateZ = THALF_D + 0.10;
  for (let fi = 0; fi < TFLOORS; fi++) {
    const base = fi * TFH;
    TDOORX.forEach((dx, ii) => {
      const u = getUnit(fi, ii);
      const door = box(g, 1.3, 2.05, 0.14, COLOR.door, dx, base + 1.05, surf);
      if (!u || u.type === 'none') return;
      if (u.type === 'num') {
        const plate = label(g, String(u.value), 1.8, 0.9);
        plate.position.set(dx, base + 2.55, plateZ);
      } else {
        const plate = label(g, '?', 1.8, 0.9, { fg: '#c0392b' });
        plate.position.set(dx, base + 2.55, plateZ);
        const bstate = { value: u.value, solved: false, plate, options: makeTowerOptions(u.value) };
        plate.userData.bstate = bstate;
        door.userData.bstate = bstate;
        raycastList.push(plate, door);
        blankStates.push(bstate);
      }
    });
    for (const wx of [-7.6, -2.75, 2.75, 7.6]) {
      box(g, 1.3, 1.5, 0.05, COLOR.trim, wx, base + 1.5, surf);
      box(g, 1.05, 1.25, 0.06, COLOR.glass, wx, base + 1.5, surf + 0.03, { roughness: 0.3, metalness: 0.1 });
    }
  }
}

/* ============================================================
   PART 3 — wide 2-story row. Leading digit(s) = building number.
   ============================================================ */

/* a plain stacked-floor slab (walls, bands, roof, sidewalks) shared by
   Parts 3 and 4 */
function buildSlabShell(g, w, d, floors, fh) {
  const h = floors * fh, halfD = d / 2;
  for (let fi = 0; fi < floors; fi++) {
    box(g, w, fh, d, fi % 2 ? COLOR.siding : COLOR.brick, 0, fi * fh + fh / 2, 0);
    box(g, w + 0.15, 0.16, d + 0.15, COLOR.band, 0, (fi + 1) * fh, 0);
  }
  box(g, w + 1.4, 0.4, d + 1.4, COLOR.roof, 0, h + 0.2, 0);
  const sw = 2.2, sy = -0.14, st = 0.05;
  for (const s of [1, -1]) box(g, w + 2 * sw, st, sw, COLOR.walkway, 0, sy, s * (halfD + sw / 2));
  for (const ex of [1, -1]) box(g, sw, st, d + 2 * sw, COLOR.walkway, ex * (w / 2 + sw / 2), sy, 0);
}

/* a wide banner across the top of the front. Also the plate the learner
   updates when they name the building. Returns the plate. */
function addTopBanner(g, h, halfD, text) {
  const plate = label(g, text, 9.6, 2.4,
    { bg: 'rgba(20,24,30,0.92)', fg: '#ffe4c2', font: 'bold 150px sans-serif', w: 1024, h: 256 });
  plate.position.set(0, h + 1.2, halfD + 0.12);
  return plate;
}
const BANNER_OPTS = { bg: 'rgba(20,24,30,0.92)', fg: '#ffe4c2', font: 'bold 150px sans-serif', w: 1024, h: 256 };

/* one front façade: RFLOORS x 5 doors. Each cell is either a number (shown)
   or a [value, mask] pair (blank — mask is the partial string, e.g. '710_'). */
function buildRowFacade(g, floorsData, raycastList, blankStates) {
  const surf = RHALF_D + 0.05, plateZ = RHALF_D + 0.10;
  for (let fi = 0; fi < RFLOORS; fi++) {
    const base = fi * RFH;
    RDOORX.forEach((dx, di) => {
      const cell = floorsData[fi][di];
      const isBlank = Array.isArray(cell);
      const value = isBlank ? cell[0] : cell;
      const door = box(g, 1.25, 2.05, 0.14, COLOR.door, dx, base + 1.05, surf);
      if (!isBlank) {
        const plate = label(g, String(value), 1.95, 0.92);
        plate.position.set(dx, base + 2.55, plateZ);
      } else {
        const plate = label(g, cell[1], 1.95, 0.92, { fg: '#c0392b' });
        plate.position.set(dx, base + 2.55, plateZ);
        const bstate = { value, solved: false, plate, options: makeBigOptions(value) };
        plate.userData.bstate = bstate;
        door.userData.bstate = bstate;
        raycastList.push(plate, door);
        blankStates.push(bstate);
      }
    });
    for (const wx of [-7.2, -2.4, 2.4, 7.2]) {
      box(g, 1.2, 1.4, 0.05, COLOR.trim, wx, base + 1.55, surf);
      box(g, 1.0, 1.15, 0.06, COLOR.glass, wx, base + 1.55, surf + 0.03, { roughness: 0.3, metalness: 0.1 });
    }
  }
  // open 2nd-floor landing + a straight stair clear of the doors at the right end
  box(g, RW, 0.16, 1.5, COLOR.balcony, 0, RFH - 0.06, RHALF_D + 0.78);
  const z = RHALF_D + 1.05;
  for (let i = 0; i < 11; i++) {
    const t = i / 10;
    box(g, 0.8, 0.12, 1.25, COLOR.step,
      THREE.MathUtils.lerp(12.4, 10.6, t),
      THREE.MathUtils.lerp(0.12, RFH - 0.05, t), z);
  }
}

/* reading-order arrows for the row example: along floor 1, then up to floor 2 */
function addRowArrows(g) {
  const z = RHALF_D + 1.35, y1 = 2.95, y2 = RFH + 2.95;
  arrow(g, new THREE.Vector3(RDOORX[0], y1, z), new THREE.Vector3(RDOORX[4], y1, z), COLOR.arrow);
  arrow(g, new THREE.Vector3(RDOORX[4], y1, z), new THREE.Vector3(RDOORX[0], y2, z), COLOR.arrow);
  arrow(g, new THREE.Vector3(RDOORX[0], y2, z), new THREE.Vector3(RDOORX[4], y2, z), COLOR.arrow);
}

/* ============================================================
   PART 4 — 4-story block numbered around the front AND back.
   ============================================================ */

/* unit = building*1000 + floor*100 + suffix.
   front: door0 -> 2f-1, door1 -> 2f+7   (odd suffixes)
   back:  door0 -> 2f+8, door1 -> 2f     (even suffixes, swapped L<->R) */
function blockUnit(building, isFront, fi, di) {
  const f = fi + 1;
  const suffix = isFront ? (di === 0 ? 2 * f - 1 : 2 * f + 7)
                         : (di === 0 ? 2 * f + 8 : 2 * f);
  return building * 1000 + f * 100 + suffix;
}

/* one façade (front s=1 / back s=-1), 4 floors x 2 doors.
   getCell(fi, di) -> { value, mask|null } */
function buildBlockFacade(g, s, isFront, getCell, raycastList, blankStates) {
  const surf = s * (BHALF_D + 0.05), plateZ = s * (BHALF_D + 0.10);
  const yaw = s > 0 ? 0 : Math.PI;
  const leftX = isFront ? -BDOORX : BDOORX;
  const rightX = isFront ? BDOORX : -BDOORX;
  for (let fi = 0; fi < BFLOORS; fi++) {
    const base = fi * BFH;
    for (const sd of [{ x: leftX, di: 0 }, { x: rightX, di: 1 }]) {
      const cell = getCell(fi, sd.di);
      const door = box(g, 1.3, 2.05, 0.14, COLOR.door, sd.x, base + 1.05, surf);
      if (cell.mask === null) {
        const plate = label(g, String(cell.value), 2.05, 0.95);
        plate.position.set(sd.x, base + 2.55, plateZ);
        plate.rotation.y = yaw;
      } else {
        const plate = label(g, cell.mask, 2.05, 0.95, { fg: '#c0392b' });
        plate.position.set(sd.x, base + 2.55, plateZ);
        plate.rotation.y = yaw;
        const bstate = { value: cell.value, solved: false, plate, options: makeBigOptions(cell.value) };
        plate.userData.bstate = bstate;
        door.userData.bstate = bstate;
        raycastList.push(plate, door);
        blankStates.push(bstate);
      }
    }
    for (const wx of [-6.6, 6.6]) {
      box(g, 1.3, 1.5, 0.05, COLOR.trim, wx, base + 1.55, surf);
      box(g, 1.05, 1.25, 0.06, COLOR.glass, wx, base + 1.55, surf + s * 0.03, { roughness: 0.3, metalness: 0.1 });
    }
    if (fi > 0) box(g, BW, 0.16, 1.5, COLOR.balcony, 0, base - 0.06, s * (BHALF_D + 0.8));
  }
}

/* switchback stair on the right end serving the upper landings */
function buildBlockAccess(g) {
  const flight = (x, z0, z1, y0, y1, n = 6) => {
    const dz = (z1 - z0) / n;
    for (let i = 0; i < n; i++) {
      const t = (i + 0.5) / n;
      box(g, 1.3, 0.12, Math.abs(dz) + 0.02, COLOR.step, x, y0 + (y1 - y0) * t, z0 + dz * (i + 0.5));
    }
  };
  const landing = (x, yc, zc) => box(g, 2.6, 0.14, 1.4, COLOR.balcony, x, yc - 0.07, zc);
  const zF = BHALF_D + 0.9, zB = -1.4, xA = BW / 2 + 0.2, xB = BW / 2 + 1.6;
  for (let t = 0; t < BFLOORS - 1; t++) {
    const yFloor = t * BFH, yMid = t * BFH + BFH / 2, yNext = (t + 1) * BFH;
    landing(xA, yFloor, zF);
    flight(xA, zF - 0.7, zB + 0.7, yFloor, yMid);
    landing(xB, yMid, zB);
    flight(xB, zB + 0.7, zF - 0.7, yMid, yNext);
  }
  landing(xA, (BFLOORS - 1) * BFH, zF);
}

/* the building label on both ends so it reads from the front or the back */
function addBlockSideSigns(g, text) {
  for (const ex of [1, -1]) {
    const sign = label(g, text, 4.2, 1.05,
      { bg: 'rgba(20,24,30,0.92)', fg: '#ffe4c2', font: 'bold 120px sans-serif', w: 1024, h: 256 });
    sign.position.set(ex * (BW / 2 + 0.06), BH * 0.62, 0);
    sign.rotation.y = ex > 0 ? -Math.PI / 2 : Math.PI / 2;
  }
}

/* ============================================================
   PART 5 — running count with NO floor digit, shown as an open dollhouse.
   ============================================================ */

/* one apartment "stall" open to the central hallway: a back (inner) wall and
   two side walls, kept lower than the floor so you can see in over them. The
   door + plate are added separately, on the perimeter side, facing out. */
function buildSeqRoom(g, face, a, base, color) {
  const RD = 3.2, h = 2.5, t = 0.16, w = 4.0;   // depth inward, height, thickness, width
  if (face === 'L' || face === 'R') {
    const sx = face === 'L' ? -1 : 1;
    for (const dz of [-w / 2, w / 2])                            // side walls
      box(g, RD, h, t, color, sx * (SQHW - RD / 2), base + h / 2, a + dz);
    box(g, t, h, w, color, sx * (SQHW - RD), base + h / 2, a);   // inner wall
  } else {
    const sz = face === 'F' ? 1 : -1;
    for (const dx of [-w / 2, w / 2])                            // side walls
      box(g, t, h, RD, color, a + dx, base + h / 2, sz * (SQHD - RD / 2));
    box(g, w, h, t, color, a, base + h / 2, sz * (SQHD - RD));   // inner wall
  }
}

/* floor plates, the central front->back hallway, corner columns, edge rails,
   sidewalk, and the building number on every face + the roof */
function buildSeqStructure(g, number) {
  for (let fi = 0; fi < SQFLOORS; fi++)                          // floor plates (kept inside the door plates so they never clip them)
    box(g, SQW + 0.2, 0.25, SQD + 0.2, COLOR.balcony, 0, fi * SQFH - 0.125, 0);
  for (let fi = 0; fi < SQFLOORS; fi++)                          // hallway runner
    box(g, 4.8, 0.06, SQD - 1.2, COLOR.walkway, 0, fi * SQFH + 0.04, 0);
  for (const sx of [-1, 1]) for (const sz of [-1, 1])            // corner columns
    box(g, 0.4, SQH, 0.4, COLOR.roof, sx * (SQHW + 0.12), SQH / 2, sz * (SQHD + 0.12));
  for (let fi = 1; fi < SQFLOORS; fi++) for (const sx of [-1, 1]) // door-less side rails up top
    box(g, 0.25, 0.5, SQD, COLOR.balcony, sx * SQHW, fi * SQFH + 0.25, 0);
  box(g, SQW + 5, 0.05, SQD + 5, COLOR.walkway, 0, -0.26, 0);    // sidewalk

  // building number — a banner high on each side face (those faces have no
  // upper-floor doors, so it stays clear), plus a rooftop sign for front/back
  for (const sx of [-1, 1]) {
    const b = label(g, `Building ${number}`, 11.0, 1.3, BANNER_OPTS);
    b.position.set(sx * (SQHW + 0.25), SQH - 0.5, 0);
    b.rotation.y = sx > 0 ? Math.PI / 2 : -Math.PI / 2;
  }
  // rooftop sign on a post (double-sided so it reads from the front and back)
  box(g, 0.3, 1.6, 0.3, COLOR.roof, 0, SQH + 0.8, -2);
  for (const yaw of [0, Math.PI]) {
    const s = label(g, `Building ${number}`, 7.0, 1.7, BANNER_OPTS);
    s.position.set(0, SQH + 2.3, -2);
    s.rotation.y = yaw;
  }
}

/* place all 20 doors (+ their stalls). getUnit(door#) -> { value, mask|null }
   (mask = the partial string to show on a blank, e.g. '12__'). Doors face out. */
function buildSeqFacade(g, getUnit, raycastList, blankStates) {
  for (const slot of SQ_LAYOUT) {
    const base = slot.f * SQFH;
    buildSeqRoom(g, slot.face, slot.a, base, slot.f % 2 ? COLOR.siding : COLOR.brick);

    let x, z, yaw, dw, dd, px, pz;
    if (slot.face === 'L' || slot.face === 'R') {
      const sx = slot.face === 'L' ? -1 : 1;
      x = sx * (SQHW + 0.02); z = slot.a; yaw = sx > 0 ? Math.PI / 2 : -Math.PI / 2;
      dw = 0.16; dd = 1.2; px = sx * (SQHW + 0.12); pz = slot.a;
    } else {
      const sz = slot.face === 'F' ? 1 : -1;
      x = slot.a; z = sz * (SQHD + 0.02); yaw = sz > 0 ? 0 : Math.PI;
      dw = 1.2; dd = 0.16; px = slot.a; pz = sz * (SQHD + 0.12);
    }

    const u = getUnit(slot.d);
    const door = box(g, dw, 2.05, dd, COLOR.door, x, base + 1.05, z);
    const plate = label(g, u.mask === null ? String(u.value) : u.mask, 1.95, 0.92,
      u.mask === null ? {} : { fg: '#c0392b' });
    plate.position.set(px, base + 2.55, pz);
    plate.rotation.y = yaw;
    if (u.mask !== null) {
      const bstate = { value: u.value, solved: false, plate, options: makeBigOptions(u.value) };
      plate.userData.bstate = bstate;
      door.userData.bstate = bstate;
      raycastList.push(plate, door);
      blankStates.push(bstate);
    }
  }
}

/* ---- ground + road (shared) ---- */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(SPAN * 4, D * 8),
  new THREE.MeshStandardMaterial({ color: COLOR.ground, roughness: 1 }));
ground.rotation.x = -Math.PI / 2; ground.position.y = -0.17; scene.add(ground);

const road = new THREE.Mesh(new THREE.PlaneGeometry(SPAN + 24, 6),
  new THREE.MeshStandardMaterial({ color: COLOR.road, roughness: 1 }));
road.rotation.x = -Math.PI / 2; road.position.set(0, -0.15, HALF_D + 5.4); scene.add(road);

/* ============================================================
   course stages
   ============================================================ */
const STAGES = [
  // ---- PART 1 — sequential numbering around a 2-story 4-plex ----
  { part: 1, type: 'plex', kind: 'example', number: 1, start: 101 },                   // 101-108, arrows
  { part: 1, type: 'plex', kind: 'quiz',    number: 2, start: 109, blanks: [112] },           // blank 112
  { part: 1, type: 'plex', kind: 'quiz',    number: 3, start: 113, blanks: [115, 116] },      // blanks 115,116
  { part: 1, type: 'plex', kind: 'quiz',    number: 4, start: 117, blanks: [118, 119, 120] }, // 3 blanks

  // ---- PART 2 — 3-digit units, first digit = floor (4 floors x 3 doors) ----
  // unit(floor fi 0-3, col ii 0-2) = (fi+1)*100 + suffixes[ii]
  { part: 2, type: 'tower', kind: 'example', label: 'A', suffixes: [28, 29, 30] },     // 128..430, arrows
  { part: 2, type: 'tower', kind: 'quiz', label: 'B', difficulty: 'Easy',
    suffixes: [21, 22, 23], blanks: [222] },                                           // 1 blank
  { part: 2, type: 'tower', kind: 'quiz', label: 'C', difficulty: 'Medium',
    suffixes: [35, 36, 37], blanks: [236, 335, 437, 137] },                            // 4 blanks

  // ---- PART 3 — 4-5 digit units; the leading digit(s) name the building ----
  { part: 3, type: 'row', kind: 'example', label: 'A', building: 1,
    floors: [[1101, 1103, 1105, 1107, 1109],
             [1202, 1204, 1206, 1208, 1210]] },
  { part: 3, type: 'row', kind: 'quiz', label: 'B', building: 7,
    floors: [[7101, [7103, '710_'], [7105, '71_5'], [7107, '7_07'], [7109, '_109']],
             [7202, 7204, 7206, 7208, 7210]],
    chooseBuilding: true, buildingOptions: [7, 1, 71, 17] },
  { part: 3, type: 'row', kind: 'quiz', label: 'C', building: 13,
    floors: [[[13117, '1_117'], [13119, '13_19'], [13121, '131_1'], [13123, '1312_'], 13125],
             [[13218, '132__'], [13220, '132_0'], [13222, '13__2'], [13224, '1__24'], [13226, '__226']]],
    chooseBuilding: true, buildingOptions: [13, 1, 131, 3] },

  // ---- PART 4 — front + back, 4 floors, a unique pattern per building ----
  { part: 4, type: 'block', kind: 'example', building: 10 },
  { part: 4, type: 'block', kind: 'quiz', building: 19,
    blanks: {                                          // value -> partial mask shown
      19101: '1_101', 19109: '19_09', 19203: '1920_', 19211: '__211',
      19305: '193__', 19407: '19_07', 19415: '19_15',
      19102: '191__', 19110: '191__', 19204: '19___', 19212: '19___',
      19306: '19___', 19314: '19___',
    } },

  // ---- PART 5 — no floor digit: one running count around the building ----
  // unit(door#) = base + door#  →  Bld 6 runs 601-620, Bld 12 runs 1231-1250.
  { part: 5, type: 'seq', kind: 'example', building: 6, base: 600 },
  { part: 5, type: 'seq', kind: 'quiz', building: 12, base: 1230,
    blanks: {                                          // door# -> partial mask shown
      1: '12__', 2: '12__', 6: '123_', 7: '123_',
      10: '____', 11: '____', 13: '____', 14: '____', 15: '____', 16: '____',
      17: '12__', 19: '12__', 20: '12__',
    } },
];

function makeOptions(correct) {
  const pool = [];
  for (const d of [-3, -2, -1, 1, 2, 3, 5, -5, 7, 10, -10]) {
    const n = correct + d;
    if (n > 100 && n !== correct) pool.push(n);
  }
  shuffle(pool);
  const distract = [];
  for (const n of pool) {
    if (distract.length >= 3) break;
    if (!distract.includes(n)) distract.push(n);
  }
  return shuffle([correct, ...distract]);
}
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* distractors for the big 4-5 digit units: nudge the suffix (±2,±4),
   the floor digit (±100) or the building (±1000) so wrong answers stay
   tempting and on-pattern. */
function makeBigOptions(correct) {
  const pool = [];
  for (const d of [-2, 2, -4, 4, -6, 6, -100, 100, -200, 200, -1000, 1000]) {
    const n = correct + d;
    if (n > 0 && n !== correct) pool.push(n);
  }
  shuffle(pool);
  const distract = [];
  for (const n of pool) {
    if (distract.length >= 3) break;
    if (!distract.includes(n)) distract.push(n);
  }
  return shuffle([correct, ...distract]);
}

function buildStageGroup(i) {
  const st = STAGES[i];
  const g = new THREE.Group();
  scene.add(g);
  const raycastList = [], blankStates = [];
  let buildingState = null;

  if (st.type === 'tower') {
    buildTowerShell(g, st.label);
    buildTowerAccess(g);
    if (st.kind === 'example') {
      buildTowerFacade(g, (fi, ii) => ({ type: 'num', value: (fi + 1) * 100 + st.suffixes[ii] }),
        raycastList, blankStates);
      addTowerArrows(g);
    } else {
      const blankSet = new Set(st.blanks);
      buildTowerFacade(g, (fi, ii) => {
        const v = (fi + 1) * 100 + st.suffixes[ii];
        return { type: blankSet.has(v) ? 'blank' : 'num', value: v };
      }, raycastList, blankStates);
    }
  } else if (st.type === 'row') {
    buildSlabShell(g, RW, RD, RFLOORS, RFH);
    const named = st.kind === 'example' || !st.chooseBuilding;
    const banner = addTopBanner(g, RH, RHALF_D, named ? `Building ${st.building}` : 'Building #');
    buildRowFacade(g, st.floors, raycastList, blankStates);
    if (st.kind === 'example') addRowArrows(g);
    if (st.kind === 'quiz' && st.chooseBuilding) {
      buildingState = {
        value: st.building, solved: false, plate: banner,
        options: shuffle([...st.buildingOptions]),
        header: 'Which building is this?<small>Read the leading digit(s)</small>',
        solvedText: v => `Building ${v}`, plateOpts: BANNER_OPTS,
      };
    }
  } else if (st.type === 'block') {
    buildSlabShell(g, BW, BD, BFLOORS, BFH);
    buildBlockAccess(g);
    addTopBanner(g, BH, BHALF_D, `Building ${st.building}`);
    addBlockSideSigns(g, `Building ${st.building}`);
    const blanksMap = st.blanks || {};
    const cell = (isFront, fi, di) => {
      const value = blockUnit(st.building, isFront, fi, di);
      return { value, mask: blanksMap[value] || null };
    };
    buildBlockFacade(g, 1, true, (fi, di) => cell(true, fi, di), raycastList, blankStates);
    buildBlockFacade(g, -1, false, (fi, di) => cell(false, fi, di), raycastList, blankStates);
    // no arrows or floor badges here — the learner figures out the pattern
  } else if (st.type === 'seq') {
    buildSeqStructure(g, st.building);
    const blanksMap = st.blanks || {};
    buildSeqFacade(g, d => ({ value: st.base + d, mask: blanksMap[d] || null }),
      raycastList, blankStates);
    // open dollhouse, no roof — the learner discovers there is no floor digit
  } else {
    buildShell(g, st.number);
    if (st.kind === 'example') {
      const u = (fo, fi, ii) => ({ type: 'num', value: st.start + fo * 4 + fi * 2 + ii });
      buildFacade(g, 1, true, u, raycastList, blankStates);
      buildFacade(g, -1, false, u, raycastList, blankStates);
      addArrows(g);
    } else {
      const blankSet = new Set(st.blanks);
      buildFacade(g, 1, true, (fo, fi, ii) => {
        const v = st.start + fi * 2 + ii;
        return { type: blankSet.has(v) ? 'blank' : 'num', value: v };
      }, raycastList, blankStates);
      // back of a course building carries no numbers (its units belong to the next building)
      buildFacade(g, -1, false, () => ({ type: 'none' }), raycastList, blankStates);
    }
  }

  g.userData = { raycastList, blankStates, buildingState };
  return g;
}

for (const btn of ui.viewbar.querySelectorAll('button[data-view]'))
  btn.onclick = () => setSeqView(btn.dataset.view);

const EXAMPLE_PROMPT =
  'This is a common <b>number layout</b> you can find at most <b>apartment buildings</b>. ' +
  'The units count up in order — the <b>yellow arrows</b> show the direction the pattern flows. ' +
  'Drag to look around and <b>memorize the pattern</b>, then on the next buildings you will ' +
  '<b>fill in the missing unit numbers</b>. When you are ready, <b>click Continue</b>.';

const EXAMPLE2_PROMPT =
  '<b>Part 2 — the first digit.</b> Taller buildings use <b>3-digit unit numbers</b>. ' +
  'The trick: the <b>first digit tells you the floor</b> — floor 1 is 1__, floor 2 is 2__, and so on. ' +
  'The last two digits stay the same as you go <b>straight up</b> a column. ' +
  'Notice every unit on floor 3 starts with <b>3</b>. Drag to look around, and when you have it, <b>click Ready</b>.';

const EXAMPLE3_PROMPT =
  '<b>Part 3 — the building number.</b> Larger complexes use <b>4- and 5-digit</b> unit numbers, ' +
  'and the <b>leading digit(s) tell you the building</b>. Here every unit starts with <b>1</b>, so this is ' +
  '<b>Building 1</b> — after the building comes the <b>floor</b>, then the door. On the next buildings you will ' +
  '<b>fill in the missing numbers</b>, then <b>choose the correct building number</b>. ' +
  'Drag to look around, and when you are ready, <b>click Ready</b>.';

const EXAMPLE4_PROMPT =
  '<b>Part 4 — everything at once.</b> This last course is the toughest: it uses <b>everything so far</b>, and ' +
  '<b>each building has its own pattern</b>. The units wrap around <b>both the front and the back</b> — the front ' +
  'doors and the doors directly <b>behind</b> them. Study how the numbers climb on <b>Building 10</b>, then ' +
  '<b>drag to spin around</b> and check the back. When you are ready, <b>click Ready</b>.';

const EXAMPLE5_PROMPT =
  '<b>Part 5 — no floor digit.</b> In some buildings the <b>floor numbers don\'t exist</b> in the unit number — ' +
  'the units are just a <b>single running count</b> around the building, one floor after another. This open ' +
  '<b>dollhouse</b> view shows every apartment off the central hallway. <b>Building 6</b> runs 601 → 620, so ' +
  'floor 1 holds the <b>lowest</b> numbers <i>and</i> the <b>highest</b> (617-620); no digit tells you the floor. ' +
  'Use the <b>Front / Back / Left / Right</b> buttons to walk around — or drag to look and pinch to zoom — then ' +
  '<b>click Ready</b>.';

const groups = {};
const celebrated = new Set();
let currentIndex = -1, currentStage = null;
let blanks = [];        // raycast targets for the active building
let activeBlank = null; // blank whose options are open

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function frameStage(st) {
  if (st.type === 'tower') {
    camera.position.set(7, TH * 0.5, 38);
    controls.target.set(0, TH * 0.42, 0);
  } else if (st.type === 'row') {
    camera.position.set(0, RH * 0.85, 32);
    controls.target.set(0, RH * 0.5, 0);
  } else if (st.type === 'block') {
    camera.position.set(10, BH * 0.5, 42);
    controls.target.set(0, BH * 0.42, 0);
  } else if (st.type === 'seq') {
    camera.position.set(-30, 11, 34);
    controls.target.set(0, 4.5, 0);
  } else {
    camera.position.set(5, H * 0.6, 25);
    controls.target.set(0, H * 0.45, 0);
  }
  controls.update();
}

/* the Front/Back/Left/Right buttons for the Part 5 dollhouse */
function setSeqView(view) {
  const yT = 4.5;
  if (view === 'front')      { camera.position.set(0, 9, 38);   controls.target.set(0, yT, 0); }
  else if (view === 'back')  { camera.position.set(0, 9, -38);  controls.target.set(0, yT, 0); }
  else if (view === 'left')  { camera.position.set(-40, 9, 0);  controls.target.set(0, yT, 0); }
  else if (view === 'right') { camera.position.set(40, 9, 0);   controls.target.set(0, yT, 0); }
  controls.update();
}

function doorsSolved() {
  const ud = groups[currentIndex]?.userData;
  return !!ud && ud.blankStates.length > 0 && ud.blankStates.every(s => s.solved);
}
function allSolved() {
  const ud = groups[currentIndex]?.userData;
  if (!ud) return false;
  const doorsDone = ud.blankStates.every(s => s.solved);
  const bldDone = !ud.buildingState || ud.buildingState.solved;
  return (ud.blankStates.length > 0 || ud.buildingState) && doorsDone && bldDone;
}

function showStage(i) {
  currentIndex = i;
  currentStage = STAGES[i];
  if (!groups[i]) groups[i] = buildStageGroup(i);
  for (const k in groups) groups[k].visible = (Number(k) === i);
  blanks = groups[i].userData.raycastList;

  closeQuiz();
  ui.next.classList.add('hidden');
  ui.continueBtn.classList.add('hidden');
  ui.back.classList.add('hidden');
  controls.autoRotate = false;

  if (currentStage.kind === 'example') {
    const p = currentStage.part;
    ui.prompt.innerHTML = p === 5 ? EXAMPLE5_PROMPT : p === 4 ? EXAMPLE4_PROMPT : p === 3 ? EXAMPLE3_PROMPT
      : p === 2 ? EXAMPLE2_PROMPT : EXAMPLE_PROMPT;
    ui.continueBtn.textContent = p > 1 ? 'Ready ▸' : 'Continue ▸';
    ui.continueBtn.classList.remove('hidden');
    if (currentIndex > 0) ui.back.classList.remove('hidden');
  } else {
    const p = currentStage.part;
    if (p === 2)
      ui.prompt.innerHTML = `<b>Building ${currentStage.label} · ${currentStage.difficulty}</b> — the first digit is the floor. ` +
        `Click a door marked <b>?</b>, then pick its correct unit number on the right.`;
    else if (p === 3)
      ui.prompt.innerHTML = `<b>Building ${currentStage.label}</b> — fill in the missing unit numbers, then name the building. ` +
        `Click a door showing a <b>partial number</b> and pick the full number on the right.`;
    else if (p === 4)
      ui.prompt.innerHTML = `<b>Building ${currentStage.building}</b> — numbers wrap around the front <i>and</i> back. ` +
        `<b>Drag to spin around</b>, then click any door showing a <b>partial number</b> and pick the full unit.`;
    else if (p === 5)
      ui.prompt.innerHTML = `<b>Building ${currentStage.building}</b> — floor numbers don't exist here; the units just count up around the building. ` +
        `<b>Find the pattern and fill in the blanks.</b> Use the <b>Front / Back / Left / Right</b> buttons to navigate, ` +
        `drag to look around, and pinch to zoom. Click a door with a <b>partial number</b> and pick the full unit.`;
    else
      ui.prompt.innerHTML = `<b>Building ${currentStage.number}</b> — keep the pattern going. ` +
        `Click a door marked <b>?</b>, then pick its correct unit number from the options on the right.`;
    ui.back.classList.remove('hidden');
  }
  ui.prompt.classList.remove('hidden');

  if (currentStage.type === 'seq') ui.viewbar.classList.remove('hidden');
  else ui.viewbar.classList.add('hidden');

  frameStage(currentStage);

  if (currentStage.kind === 'quiz') resumeQuizState();
}

/* re-entering a quiz: pick up where the learner left off (door blanks, then
   the building-number step, then the Next button) */
function resumeQuizState() {
  const ud = groups[currentIndex].userData;
  if (!ud.blankStates.every(s => s.solved)) return;   // still has doors to fill
  if (ud.buildingState && !ud.buildingState.solved) {
    ui.prompt.innerHTML = `All units filled in — now <b>choose the building number</b>.`;
    openQuiz(ud.buildingState);
  } else {
    showNext();   // already finished (no confetti on a revisit)
  }
}

/* ---- quiz interaction ---- */
function openQuiz(bstate) {
  if (bstate.solved) return;
  activeBlank = bstate;
  ui.qhead.innerHTML = bstate.header || 'Which unit is this?<small>Pick the number that fits the pattern</small>';
  ui.qopts.innerHTML = '';
  bstate.options.forEach((val, idx) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="ltr">${'abcd'[idx]})</span> ${val}`;
    btn.onclick = () => chooseOption(bstate, val, btn);
    ui.qopts.appendChild(btn);
  });
  ui.qmsg.textContent = '';
  ui.qmsg.className = '';
  ui.quiz.classList.remove('hidden');
}

function chooseOption(bstate, val, btn) {
  if (bstate !== activeBlank || bstate.solved) return;
  if (val === bstate.value) {
    bstate.solved = true;
    setPlateText(bstate.plate,
      bstate.solvedText ? bstate.solvedText(val) : String(val),
      bstate.plateOpts || {});
    btn.classList.add('right');
    [...ui.qopts.children].forEach(b => b.disabled = true);
    ui.qmsg.textContent = '✓ Correct!';
    ui.qmsg.className = 'ok';
    setTimeout(() => { if (!activeBlank || activeBlank.solved) closeQuiz(); }, 650);
    checkComplete();
  } else {
    btn.disabled = true;
    btn.classList.add('wrong');
    ui.qmsg.textContent = 'Not quite — try again.';
    ui.qmsg.className = 'bad';
  }
}

function closeQuiz() {
  activeBlank = null;
  ui.quiz.classList.add('hidden');
}

function checkComplete() {
  if (!doorsSolved()) return;
  const bs = groups[currentIndex].userData.buildingState;
  if (bs && !bs.solved) {                     // all units in — now name the building
    ui.prompt.innerHTML = `Nice — every unit is filled in. Now <b>choose the building number</b>.`;
    openQuiz(bs);
    return;
  }
  if (!celebrated.has(currentIndex)) {
    celebrated.add(currentIndex);
    fireConfetti();
  }
  showNext();
}

function showNext() {
  const isLast = currentIndex === STAGES.length - 1;
  const nextStage = STAGES[currentIndex + 1];
  if (isLast) ui.next.textContent = 'Start Over ▸';
  else if (nextStage && nextStage.kind === 'example') ui.next.textContent = `Next: Part ${nextStage.part} ▸`;
  else ui.next.textContent = 'Next Building ▸';
  ui.next.classList.remove('hidden');
}

/* ---- buttons ---- */
function resetCourse() {
  for (const k of Object.keys(groups)) {
    const g = groups[k];
    scene.remove(g);
    g.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) { o.material.map?.dispose(); o.material.dispose(); }
    });
    delete groups[k];
  }
  celebrated.clear();
}

ui.continueBtn.onclick = () => showStage(currentIndex + 1);
ui.back.onclick = () => showStage(Math.max(0, currentIndex - 1));
ui.next.onclick = () => {
  if (currentIndex < STAGES.length - 1) showStage(currentIndex + 1);
  else { resetCourse(); showStage(0); } // "Start Over" — fresh run from Part 1
};

/* ---- click a blank door/plate to open its options ---- */
let downPos = null;
renderer.domElement.addEventListener('pointerdown', e => { downPos = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('pointerup', e => {
  if (!downPos) return;
  const moved = Math.hypot(e.clientX - downPos.x, e.clientY - downPos.y);
  downPos = null;
  if (moved > 6 || currentStage.kind !== 'quiz') return; // a drag, or no quiz here

  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  for (const h of raycaster.intersectObjects(blanks, false)) {
    const bs = h.object.userData.bstate;
    if (bs && !bs.solved) { openQuiz(bs); return; }
  }
});

/* ============================================================
   confetti (lightweight 2D canvas overlay)
   ============================================================ */
const cc = document.createElement('canvas');
cc.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:50';
document.body.appendChild(cc);
const cctx = cc.getContext('2d');
function sizeConfetti() { cc.width = innerWidth; cc.height = innerHeight; }
sizeConfetti();

let confetti = [];
function fireConfetti() {
  const colors = ['#ff5252', '#ffd54a', '#57c97e', '#42a5f5', '#ab47bc', '#ff9800'];
  for (let i = 0; i < 170; i++) {
    confetti.push({
      x: innerWidth / 2 + (Math.random() - 0.5) * 240,
      y: innerHeight * 0.32,
      vx: (Math.random() - 0.5) * 10,
      vy: -7 - Math.random() * 9,
      g: 0.22 + Math.random() * 0.12,
      rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 0.45,
      w: 6 + Math.random() * 7, h: 8 + Math.random() * 9,
      color: colors[i % colors.length],
    });
  }
}
function drawConfetti() {
  cctx.clearRect(0, 0, cc.width, cc.height);
  if (!confetti.length) return;
  confetti = confetti.filter(p => p.y < innerHeight + 40);
  for (const p of confetti) {
    p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
    cctx.save();
    cctx.translate(p.x, p.y); cctx.rotate(p.rot);
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    cctx.restore();
  }
}

/* ============================================================
   loop + resize
   ============================================================ */
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  sizeConfetti();
});
(function tick() {
  controls.update();
  renderer.render(scene, camera);
  drawConfetti();
  requestAnimationFrame(tick);
})();

showStage(0);
</script>
</body>
</html>
